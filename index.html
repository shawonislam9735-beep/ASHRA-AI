<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ashra — Intelligence, Activated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!--
    ZERO-FLICKER STRATEGY:
    1. body starts with opacity:0 and a loading spinner is shown
    2. JS immediately checks localStorage for a token
    3. Calls /me to verify — responds in <1ms (sync JWT verify)
    4. If valid  → fade body in showing appShell
    5. If invalid → fade body in showing authScreen
    Result: user NEVER sees a login flash
  -->
  <style>
    /* Body is visible immediately — no black screen on any load */
    body { opacity: 1; }
    #loadingScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: #060d1a;
      display: flex; align-items: center; justify-content: center;
    }
    .boot-logo {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .boot-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(34,197,94,.5);
      animation: boot-pulse 1.2s ease-in-out infinite;
    }
    .boot-name {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: .02em;
    }
    .boot-status {
      font-family: 'DM Sans', sans-serif; font-size: .78rem;
      color: rgba(148,163,184,.6); margin-top: 4px; text-align: center;
      transition: opacity .4s ease;
    }
    @keyframes boot-pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(34,197,94,.5); transform: scale(1); }
      50%       { box-shadow: 0 0 60px rgba(34,197,94,.7); transform: scale(1.04); }
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN — shown during auth check -->
<div id="loadingScreen">
  <div class="boot-logo">
    <div class="boot-mark">
      <svg width="30" height="30" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" stroke="white" stroke-width="7" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="boot-name">Ashra</div>
    <div class="boot-status" id="bootStatus">Loading…</div>
  </div>
</div>

<!-- BACKGROUND DECORATIONS -->
<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<!-- ══════════════════════ AUTH SCREEN ══════════════════════ -->
<div class="auth-screen" id="authScreen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" stroke="white" stroke-width="7" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="auth-logo-title"><span>Ashra</span></div>
        <div class="auth-logo-sub">Intelligence, Activated</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Sign In</button>
      <button class="auth-tab" id="tabSignup">Create Account</button>
    </div>

    <div id="authMsg" class="auth-msg"></div>

    <div class="auth-form">
      <div class="auth-field">
        <label class="auth-label" for="authUsername">USERNAME</label>
        <div class="auth-input-wrap">
          <input class="auth-input" id="authUsername" type="text"
            placeholder="yourname" autocomplete="username" spellcheck="false" maxlength="32"/>
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="authPassword">PASSWORD</label>
        <div class="auth-input-wrap">
          <input class="auth-input" id="authPassword" type="password"
            placeholder="Min. 6 characters" autocomplete="current-password" maxlength="128"/>
          <button class="auth-eye" id="authEye" aria-label="Toggle password visibility">
            <svg id="authEyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength" id="pwStrengthBar" style="display:none">
          <div class="pw-strength-fill" id="pwStrengthFill"></div>
        </div>
      </div>
      <button class="auth-submit" id="authSubmit">Sign In →</button>
      <p class="auth-note">🔒 Secured with bcrypt + JWT · Built by Ashraful Islam</p>
    </div>
  </div>
</div>

<!-- ══════════════════════ CONFIRM DIALOG ══════════════════════ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">Confirm</div>
    <div class="confirm-desc"  id="confirmDesc">Are you sure?</div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel"      id="confirmCancel">Cancel</button>
      <button class="confirm-btn confirm-del" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<!-- ══════════════════════ APP SHELL ══════════════════════ -->
<div class="app-shell" id="appShell" style="display:none">

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" stroke="white" stroke-width="7" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">Ashra</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="sidebar-section-label">CONVERSATIONS</div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <div class="user-strip">
        <div class="user-avatar-badge" id="userAvatarBadge">A</div>
        <div class="user-info">
          <div class="user-display-name" id="userNameDisplay">User</div>
          <div class="user-role-tag">Member</div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="footer-actions">
        <button class="footer-action-btn danger" id="btnClearChats" title="Delete all conversations">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Clear All Chats
        </button>
      </div>

      <div class="status-strip">
        <div class="status-dot"></div>
        <span class="status-text">Ashra · Online</span>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN CHAT ─── -->
  <main class="chat-main">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-status-pill">
          <span class="status-dot-sm"></span>
          Ashra · Online
        </div>
      </div>

      <div class="header-center">
        <span class="header-chat-title" id="headerChatTitle">Ashra</span>
        <span class="header-sub">Intelligence, Activated</span>
      </div>

      <div class="header-right">
        <span class="char-counter" id="charCounter">0 / 500</span>
        <span class="rate-badge" id="rateBadge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8"  x2="12"   y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Cooldown…
        </span>
        <button class="header-icon-btn" id="clearBtn" title="Clear this chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-wrapper" id="messagesWrapper">
      <div class="messages-container" id="messages"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-box" id="inputBox">
        <div class="textarea-wrap">
          <textarea
            id="userInput"
            placeholder="Ask Ashra anything…"
            rows="1"
            autocomplete="off"
            spellcheck="false"
            maxlength="500"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Ashra · Your intelligent companion · Built by Ashraful Islam</p>
    </div>
  </main>

</div><!-- /app-shell -->

<!-- ══════════════════════ STYLES ══════════════════════ -->
<style>
/* ============================================================
   Ashra — Premium Chat UI v9
   Author: Ashraful Islam

   KEY CHANGES:
   - Clean "Ashra" branding everywhere (no "AI")
   - Bigger, bolder logo (54px auth / 44px sidebar)
   - Wider sidebar (300px), bigger fonts, generous spacing
   - Zero-flicker auth (loading screen + opacity strategy)
   - Memory UI completely removed
   - Premium message animations (fade + slide-up)
   - Modern input box with glow focus state
   - Polished hover/transition effects throughout
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Colors */
  --bg-deep:        #060d1a;
  --bg-surface:     #0d1829;
  --bg-elevated:    #142034;
  --primary:        #22c55e;
  --primary-dim:    rgba(34,197,94,.14);
  --primary-glow:   rgba(34,197,94,.42);
  --primary-hover:  rgba(34,197,94,.22);
  --accent:         #38bdf8;
  --accent-dim:     rgba(56,189,248,.12);
  --glass:          rgba(255,255,255,.048);
  --glass-border:   rgba(255,255,255,.085);
  --text-high:      #eef4ff;
  --text-mid:       #8fa3c0;
  --text-low:       #445566;
  --danger:         #f43f5e;
  --danger-dim:     rgba(244,63,94,.12);
  --warn:           #f59e0b;

  /* Radii */
  --r-xs:  6px;
  --r-sm:  10px;
  --r-md:  15px;
  --r-lg:  22px;
  --r-xl:  28px;

  /* Typography */
  --font-display: 'Syne',    sans-serif;
  --font-body:    'DM Sans', sans-serif;

  /* Layout */
  --sidebar-w:  305px;
  --header-h:   64px;

  /* Transition */
  --t:  0.18s cubic-bezier(.4,0,.2,1);
  --t-slow: 0.32s cubic-bezier(.4,0,.2,1);
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-high);
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  transition: opacity .3s ease;
}
/* body is always opacity:1 — no transition class needed */

/* ── BACKGROUND ──────────────────────────────────── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(56,189,248,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.02) 1px, transparent 1px);
  background-size: 46px 46px;
}
.bg-orb {
  position: fixed; border-radius: 50%;
  filter: blur(120px); pointer-events: none; z-index: 0;
}
.orb-1 { width: 660px; height: 660px; top: -220px; left: -170px; background: radial-gradient(circle, rgba(34,197,94,.07) 0%, transparent 70%); }
.orb-2 { width: 530px; height: 530px; bottom: -130px; right: -130px; background: radial-gradient(circle, rgba(56,189,248,.06) 0%, transparent 70%); }
.orb-3 { width: 320px; height: 320px; top: 44%; left: 54%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(34,197,94,.04) 0%, transparent 70%); }

/* ══════════════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════════════ */
.auth-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fade-up .3s ease both;
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-xl);
  padding: 42px 38px;
  width: 100%; max-width: 430px;
  box-shadow: 0 48px 100px rgba(0,0,0,.65), 0 0 0 1px rgba(34,197,94,.07);
  position: relative; z-index: 1;
}

/* Auth logo — bigger and bolder */
.auth-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 32px; }
.auth-logo-mark {
  width: 54px; height: 54px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px var(--primary-glow), 0 0 14px rgba(56,189,248,.28);
}
.auth-logo-title { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; line-height: 1.1; }
.auth-logo-title span {
  background: linear-gradient(90deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.auth-logo-sub { font-size: .7rem; color: var(--text-low); letter-spacing: .12em; text-transform: uppercase; margin-top: 3px; }

/* Tabs */
.auth-tabs {
  display: flex; gap: 4px; margin-bottom: 28px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-md); padding: 4px;
}
.auth-tab {
  flex: 1; padding: 10px 12px;
  border: none; border-radius: 11px; background: transparent;
  color: var(--text-low); font-family: var(--font-body);
  font-size: .86rem; font-weight: 500; cursor: pointer; transition: all var(--t);
}
.auth-tab.active {
  background: var(--primary-dim); color: var(--primary);
  border: 1px solid rgba(34,197,94,.26); box-shadow: 0 0 16px var(--primary-glow);
}

/* Form */
.auth-form  { display: flex; flex-direction: column; gap: 16px; }
.auth-field { display: flex; flex-direction: column; gap: 7px; }
.auth-label { font-size: .72rem; font-weight: 700; letter-spacing: .09em; color: var(--text-mid); }
.auth-input-wrap { position: relative; }
.auth-input {
  width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-md); padding: 14px 46px 14px 17px;
  color: var(--text-high); font-family: var(--font-body); font-size: .93rem;
  outline: none; transition: border-color var(--t), box-shadow var(--t);
}
.auth-input:focus { border-color: rgba(34,197,94,.45); box-shadow: 0 0 0 3px rgba(34,197,94,.1); }
.auth-input::placeholder { color: var(--text-low); }
.auth-input.error { border-color: rgba(244,63,94,.55); box-shadow: 0 0 0 3px rgba(244,63,94,.08); }
.auth-eye {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-low);
  cursor: pointer; display: grid; place-items: center; padding: 5px;
  transition: color var(--t); border-radius: 6px;
}
.auth-eye:hover { color: var(--text-mid); background: var(--glass); }

.pw-strength { height: 3px; border-radius: 2px; margin-top: 7px; background: var(--glass-border); overflow: hidden; }
.pw-strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }

.auth-msg { padding: 11px 15px; border-radius: var(--r-sm); font-size: .83rem; line-height: 1.45; display: none; }
.auth-msg.error   { background: var(--danger-dim); border: 1px solid rgba(244,63,94,.3); color: var(--danger); display: block; }
.auth-msg.success { background: var(--primary-dim); border: 1px solid rgba(34,197,94,.26); color: var(--primary); display: block; }

.auth-submit {
  padding: 14px 18px; margin-top: 5px;
  background: linear-gradient(135deg, var(--primary), #15a34a);
  border: none; border-radius: var(--r-md); color: #fff;
  font-family: var(--font-body); font-size: .93rem; font-weight: 600;
  cursor: pointer; transition: all var(--t);
  box-shadow: 0 0 22px var(--primary-glow);
  letter-spacing: .01em;
}
.auth-submit:hover { box-shadow: 0 0 38px var(--primary-glow); transform: translateY(-1px); }
.auth-submit:active { transform: translateY(0); }
.auth-submit:disabled { opacity: .52; cursor: not-allowed; transform: none; box-shadow: none; }
.auth-note { font-size: .7rem; color: var(--text-low); text-align: center; margin-top: 12px; line-height: 1.6; }

/* ══════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════ */
.app-shell { position: relative; z-index: 1; display: flex; height: 100dvh; overflow: hidden; }

/* ══════════════════════════════════════════════════
   SIDEBAR — 305px wide, premium spacing, bigger fonts
══════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: rgba(6,12,25,.9);
  backdrop-filter: blur(36px); -webkit-backdrop-filter: blur(36px);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column;
  overflow: hidden; transition: transform var(--t); z-index: 20;
}

/* Sidebar logo — bold, bigger mark */
.sidebar-logo {
  display: flex; align-items: center; gap: 13px;
  padding: 20px 22px 18px;
  border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
}
.logo-mark {
  width: 44px; height: 44px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 28px var(--primary-glow), 0 0 10px rgba(56,189,248,.22);
}
.logo-name {
  font-family: var(--font-display); font-weight: 800;
  font-size: 1.35rem; letter-spacing: .01em;
  background: linear-gradient(90deg, var(--text-high) 55%, var(--primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* New chat button */
.new-chat-btn {
  display: flex; align-items: center; gap: 10px;
  margin: 14px 14px 6px; padding: 12px 16px;
  background: var(--primary-dim); border: 1px solid rgba(34,197,94,.3);
  border-radius: var(--r-md); color: var(--primary);
  font-family: var(--font-body); font-size: .9rem; font-weight: 500;
  cursor: pointer; transition: all var(--t); flex-shrink: 0; letter-spacing: .01em;
}
.new-chat-btn:hover {
  background: var(--primary-hover); border-color: rgba(34,197,94,.6);
  box-shadow: 0 0 22px var(--primary-glow); transform: translateY(-1px);
}
.new-chat-btn:active { transform: translateY(0); }

.sidebar-section-label {
  font-size: .65rem; font-weight: 700; letter-spacing: .14em;
  color: var(--text-low); padding: 13px 22px 6px; flex-shrink: 0;
}

/* Chat list — spacious, premium */
.chat-list {
  flex: 1; overflow-y: auto; padding: 5px 10px 10px;
  display: flex; flex-direction: column; gap: 3px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.07) transparent;
}
.chat-list::-webkit-scrollbar { width: 3px; }
.chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }

/* Chat items — bigger, more breathing room */
.chat-item {
  display: flex; align-items: center;
  border-radius: var(--r-sm); border: 1px solid transparent;
  transition: all var(--t); cursor: pointer;
  overflow: hidden; position: relative; min-height: 46px;
}
.chat-item:hover {
  background: var(--glass); border-color: var(--glass-border);
  transform: translateX(2px);
}
.chat-item:hover .chat-item-actions { opacity: 1; }
.chat-item.active {
  background: var(--primary-dim); border-color: rgba(34,197,94,.22);
  transform: none;
}
.chat-item.active .chat-item-label { color: var(--primary); }
.chat-item.active .chat-item-icon  { color: var(--primary); }
.chat-item.renaming .chat-item-label { display: none; }
.chat-item.renaming .chat-item-rename-input { display: block; }

.chat-item-icon { flex-shrink: 0; margin-left: 12px; color: var(--text-low); display: flex; align-items: center; }
.chat-item-label {
  flex: 1; padding: 11px 7px 11px 9px;
  font-size: .88rem; /* bigger title font */
  color: var(--text-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;

<script>
'use strict';

/* ============================================================
   Ashra — Frontend v9
   Key improvements:
   1. ZERO-FLICKER AUTH: loading screen → instant /me check →
      show correct screen. Login NEVER flashes on reload.
   2. Clean "Ashra" branding — no "AI" anywhere
   3. Memory UI completely removed
   4. Premium animations, bigger sidebar, better spacing
   5. Persistent context: last 20 messages sent as history
   Author: Ashraful Islam
   ============================================================ */

// ── Config ─────────────────────────────────────────────────────
const API_BASE      = 'https://ashra-backend.onrender.com';
const MAX_MSG_LEN   = 500;
const RATE_LIMIT_MS = 3000;
const CONTEXT_MSGS  = 20;   // last N messages sent as context
let   lastSendTime  = 0;

// ── Storage keys (v9 — versioned to avoid stale data) ──────────
const KEYS = {
  token:      'ashra_jwt_v9',
  user:       'ashra_user_v9',
  chats:      u => `ashra_chats_v9_${u}`,
  activeChat: u => `ashra_active_v9_${u}`,
};

// ── State ───────────────────────────────────────────────────────
let jwtToken       = null;
let currentUser    = null;
let chats          = [];
let activeChatId   = null;
let pendingConfirm = null;

// ── Auth helpers ────────────────────────────────────────────────
function getToken()    { return jwtToken || localStorage.getItem(KEYS.token); }
function storeToken(t) { jwtToken = t; localStorage.setItem(KEYS.token, t); }
function clearToken()  { jwtToken = null; localStorage.removeItem(KEYS.token); }
function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
}

// ── API helper with retry ───────────────────────────────────────
// Retries once on network failure (handles Render cold-start ~30s spin-up)
// timeout: how long to wait before aborting a single attempt (ms)
async function apiCall(endpoint, options = {}, retries = 1, timeout = 25000) {
  const attempt = async () => {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(API_BASE + endpoint, {
        signal: controller.signal,
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      clearTimeout(timer);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      return data;
    } catch (err) {
      clearTimeout(timer);
      throw err;
    }
  };

  for (let i = 0; i <= retries; i++) {
    try {
      return await attempt();
    } catch (err) {
      const isLast        = i === retries;
      const isNetworkErr  = err.name === 'AbortError' || err.message === 'Failed to fetch' || err.name === 'TypeError';
      const isAuthErr     = err.message && (err.message.includes('401') || err.message.toLowerCase().includes('token') || err.message.toLowerCase().includes('expired'));


      // Never retry auth errors — token is genuinely invalid
      if (isAuthErr) throw err;

      // Retry network errors (Render cold start, brief outage)
      if (isNetworkErr && !isLast) {
        await new Promise(r => setTimeout(r, 3000));
        continue;
      }

      throw err;
    }
  }
}

// ── Input sanitisation ──────────────────────────────────────────
function sanitize(str) {
  return String(str)
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/<[^>]+>/g, '')
    .replace(/javascript:/gi, '')
    .replace(/on\w+\s*=/gi, '')
    .trim().slice(0, MAX_MSG_LEN);
}
function validateUsername(u) {
  if (!u || u.length < 3)           return 'Username must be at least 3 characters.';
  if (u.length > 32)                return 'Username must be 32 characters or less.';
  if (!/^[a-zA-Z0-9_]+$/.test(u)) return 'Username: letters, numbers, underscores only.';
  return null;
}
function validatePassword(p) {
  if (!p || p.length < 6) return 'Password must be at least 6 characters.';
  if (p.length > 128)     return 'Password too long.';
  return null;
}

/* ══════════════════════════════════════════════════════════════
   AUTH BOOT — robust, retry-aware, no false logouts
   ─────────────────────────────────────────────────────────────
   FIX 1 — Network errors (Render cold start) no longer clear
            the token. Only a genuine 401 does that.
   FIX 2 — /me is retried once after a 3s pause if it fails
            due to network timeout (covers 30s spin-up window).
   FIX 3 — Loading screen stays visible during retry so user

══════════════════════════════════════════════════════════════ */

  const savedUser  = localStorage.getItem(KEYS.user);

  // ── STEP 1: Render UI IMMEDIATELY from localStorage ─────────
  // Never block the screen waiting for a network call.
  // Show the correct screen right away based on what we have locally.
  if (savedToken && savedUser) {
    // Looks like a logged-in user — show the app instantly
    jwtToken    = savedToken;
    currentUser = savedUser;
    showScreenInstant('app');
  } else {
    // No saved session — show login instantly
    showScreenInstant('auth');
    return; // nothing more to do
  }

  // ── STEP 2: Verify token in background (non-blocking) ───────
  // UI is already visible. This runs silently after render.
  // Only acts if token turns out to be genuinely invalid (401).
  const slowTimer = setTimeout(() => {
    const el = document.getElementById('bootStatus');
    if (el) el.textContent = 'Server waking up… please wait';
  }, 5000);

  try {
    const data = await apiCall('/me', { headers: authHeaders() }, 1, 25000);
    clearTimeout(slowTimer);
    // Sync username from server (authoritative)
    currentUser = data.username;
    localStorage.setItem(KEYS.user, data.username);
    // Update display name if it changed
    const display = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
    const nameEl  = document.getElementById('userNameDisplay');
    const avatarEl = document.getElementById('userAvatarBadge');
    if (nameEl)   nameEl.textContent   = display;
    if (avatarEl) avatarEl.textContent = currentUser.charAt(0).toUpperCase();

  } catch (err) {
    clearTimeout(slowTimer);
    const isAuthErr = err.message && (
      err.message.includes('401') ||
      err.message.toLowerCase().includes('token') ||
      err.message.toLowerCase().includes('expired') ||
      err.message.toLowerCase().includes('invalid')
    );

    if (isAuthErr) {
      // Genuine bad token — log out gracefully, UI already visible
      clearToken();
      localStorage.removeItem(KEYS.user);
      currentUser = null; chats = []; activeChatId = null;
      document.getElementById('appShell').style.display   = 'none';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('authScreen').style.display = 'flex';
      authUsername.focus();
    }
    // Network errors (server cold start etc.) — do nothing.
    // User can still use the UI; next chat send will re-auth if needed.
  }
}

// Render the correct screen immediately — no network wait
function showScreenInstant(screen) {
  document.getElementById('loadingScreen').style.display = 'none';

  if (screen === 'app') {
    document.getElementById('appShell').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
    authUsername.focus();
  }
}

function initApp() {
  const display = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
  document.getElementById('userNameDisplay').textContent = display;
  document.getElementById('userAvatarBadge').textContent = currentUser.charAt(0).toUpperCase();
  loadChats();
  userInput.focus();
}

const authScreen     = document.getElementById('authScreen');

const pwStrengthBar  = document.getElementById('pwStrengthBar');
const pwStrengthFill = document.getElementById('pwStrengthFill');

let authMode = 'login';

tabLogin.addEventListener('click',  () => switchAuthMode('login'));

function switchAuthMode(mode) {
  authMode = mode;

// Password visibility toggle
authEye.addEventListener('click', () => {

  authEyeIcon.innerHTML = show
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;

// Password strength meter (signup only)
authPassword.addEventListener('input', () => {
  if (authMode !== 'signup') return;
  const p = authPassword.value;
  let s = 0;
  if (p.length >= 6)  s++;
  if (p.length >= 10) s++;
  if (/[A-Z]/.test(p)) s++;
  if (/[0-9]/.test(p)) s++;
  if (/[^a-zA-Z0-9]/.test(p)) s++;
  pwStrengthFill.style.width      = (s / 5 * 100) + '%';
  pwStrengthFill.style.background = s <= 1 ? '#f43f5e' : s <= 3 ? '#f59e0b' : '#22c55e';
});

function showAuthMsg(text, type = 'error') { authMsg.textContent = text; authMsg.className = 'auth-msg ' + type; }
function clearAuthMsg() { authMsg.className = 'auth-msg'; authMsg.textContent = ''; }

[authUsername, authPassword].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') authSubmit.click(); });
});

authSubmit.addEventListener('click', async () => {
  clearAuthMsg();
  // Trim + lowercase for consistent matching with backend
  const username = authUsername.value.trim().toLowerCase();
  const password = authPassword.value;

  const uErr = validateUsername(username);
  if (uErr) { showAuthMsg(uErr); authUsername.classList.add('error'); return; }
  authUsername.classList.remove('error');

  const pErr = validatePassword(password);
  if (pErr) { showAuthMsg(pErr); authPassword.classList.add('error'); return; }
  authPassword.classList.remove('error');

  authSubmit.disabled = true;
  authSubmit.textContent = 'Please wait…';

  const endpoint = authMode === 'login' ? '/login' : '/signup';

  try {
    const data = await apiCall(endpoint, {
      method: 'POST',
      body: JSON.stringify({ username, password }),
    }, 1, 20000); // retry once, 20s timeout


    storeToken(data.token);
    // Always store the username the SERVER returns (authoritative, correct case)
    localStorage.setItem(KEYS.user, data.username);
    currentUser = data.username;

    if (authMode === 'signup') {
      showAuthMsg('Account created! Welcome to Ashra 😊', 'success');
      setTimeout(() => { authScreen.style.display = 'none'; initApp(); }, 700);
    } else {
      authScreen.style.display = 'none';
      initApp();
    }

  } catch (err) {

    // Give specific, helpful messages based on error type
    let msg = err.message || 'Something went wrong. Try again.';

    // Network / server offline
    if (err.name === 'AbortError' || msg === 'Failed to fetch' || err.name === 'TypeError') {
      msg = 'Cannot reach server. It may be starting up — wait 30 seconds and try again.';
    }
    // Wrong password
    else if (msg.toLowerCase().includes('incorrect') || msg.toLowerCase().includes('password')) {
      msg = 'Incorrect password. Please try again.';
    }
    // Username not found — give helpful suggestion
    else if (msg.toLowerCase().includes('not found') || msg.toLowerCase().includes('no account')) {
      msg = 'No account found with that username. Check spelling or create an account.';
    }
    // Already taken
    else if (msg.toLowerCase().includes('taken') || msg.toLowerCase().includes('exists')) {
      msg = 'Username already taken. Try a different one or sign in instead.';
    }

    showAuthMsg(msg);
    authSubmit.disabled = false;
    authSubmit.textContent = authMode === 'login' ? 'Sign In →' : 'Create Account →';
  }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', () => {
  saveChats();
  if (currentUser) localStorage.removeItem(KEYS.activeChat(currentUser));
  clearToken();
  localStorage.removeItem(KEYS.user);

/* ══════════════════════════════════════════════════════════════
   CHAT STORAGE — localStorage, per user, versioned keys
══════════════════════════════════════════════════════════════ */
function loadChats() {
  try { chats = JSON.parse(localStorage.getItem(KEYS.chats(currentUser)) || '[]'); }
  catch { chats = []; }

  // Restore the last active chat ID from localStorage
  const savedActiveId = localStorage.getItem(KEYS.activeChat(currentUser));

  if (chats.length === 0) {
    // No chats at all — create exactly one empty chat to start with
    const first = createChat('New Chat');
    activeChatId = first.id;
  } else {
    // Try to restore the previously active chat
    const restoredChat = savedActiveId && chats.find(c => c.id === savedActiveId);
    if (restoredChat) {
      activeChatId = restoredChat.id;
    } else {
      // Fall back to most recent chat
      activeChatId = chats[0].id;
    }
  }

  saveActiveChat();
  renderSidebar();
  renderMessages();
}

function saveChats() {
  try { localStorage.setItem(KEYS.chats(currentUser), JSON.stringify(chats)); } catch(e) {}
}

function saveActiveChat() {
  try { localStorage.setItem(KEYS.activeChat(currentUser), activeChatId); } catch(e) {}
}

function genId() { return 'c' + Date.now() + Math.random().toString(36).slice(2, 5); }

function createChat(title) {
  const c = { id: genId(), title: title || 'New Chat', messages: [], createdAt: Date.now() };
  chats.unshift(c); saveChats(); return c;
}

function getActiveChat() { return chats.find(c => c.id === activeChatId) || null; }

function titleFromMsg(text) {
  const t = text.replace(/\s+/g, ' ').trim();
  return t.length > 28 ? t.slice(0, 27) + '…' : t;
}

// Clear all chats
document.getElementById('btnClearChats').addEventListener('click', () => {
  showConfirm('Clear All Chats?', 'All conversations will be permanently deleted.', () => {
    chats = []; saveChats();
    // Create one fresh empty chat after clearing
    const f = createChat('New Chat');
    activeChatId = f.id;
    saveActiveChat();
    renderSidebar(); renderMessages();
    showToast('Chats cleared 🌟');
  });
});

const chatList   = document.getElementById('chatList');
const newChatBtn = document.getElementById('newChatBtn');

function renderSidebar() {
  chatList.innerHTML = '';
  if (chats.length === 0) {
    chatList.innerHTML = `<div style="padding:18px 14px;font-size:.84rem;color:var(--text-low);text-align:center">No conversations yet</div>`;
    return;
  }
  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
    item.dataset.id = chat.id;
    item.innerHTML = `
      <div class="chat-item-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="chat-item-label" title="${escapeAttr(chat.title)}">${escapeHTML(chat.title)}</span>
      <input class="chat-item-rename-input" type="text" value="${escapeAttr(chat.title)}" maxlength="60" spellcheck="false"/>
      <div class="chat-item-actions">
        <button class="chat-action-btn rename-btn" title="Rename">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="chat-action-btn delete" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>`;

    item.addEventListener('click', e => {
      if (e.target.closest('.chat-item-actions') || item.classList.contains('renaming')) return;
      switchChat(chat.id); closeSidebarMobile();
    });
    item.querySelector('.rename-btn').addEventListener('click', e => {
      e.stopPropagation(); startRename(item, chat);
    });
    item.querySelector('.delete').addEventListener('click', e => {
      e.stopPropagation();
      showConfirm('Delete this chat?', 'This conversation will be permanently removed.', () => doDeleteChat(chat.id));
    });

    const inp = item.querySelector('.chat-item-rename-input');
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commitRename(item, chat, inp.value); }
      if (e.key === 'Escape') cancelRename(item);
      e.stopPropagation();
    });
    inp.addEventListener('blur', () => { if (item.classList.contains('renaming')) commitRename(item, chat, inp.value); });
    inp.addEventListener('click', e => e.stopPropagation());
    chatList.appendChild(item);
  });
}

function startRename(item, chat) {
  item.classList.add('renaming');
  const inp = item.querySelector('.chat-item-rename-input');
  inp.value = chat.title;
  requestAnimationFrame(() => { inp.focus(); inp.select(); });
}
function commitRename(item, chat, value) {
  const t = sanitize(value);
  if (t) { chat.title = t; saveChats(); if (chat.id === activeChatId) headerTitle.textContent = t; }
  cancelRename(item); renderSidebar();
}
function cancelRename(item) { item.classList.remove('renaming'); }

function doDeleteChat(id) {
  chats = chats.filter(c => c.id !== id); saveChats();
  if (activeChatId === id) {
    // Prefer switching to an existing empty chat rather than creating a new one
    const emptyChat = chats.find(c => c.messages.length === 0);
    if (emptyChat) {
      activeChatId = emptyChat.id;
    } else if (chats.length > 0) {
      activeChatId = chats[0].id;
    } else {
      // Last chat was deleted — create one fresh empty chat
      const fresh = createChat('New Chat');
      activeChatId = fresh.id;
    }
    saveActiveChat();
    renderMessages();
  }
  renderSidebar();
}

newChatBtn.addEventListener('click', () => {
  // If the current active chat is already empty, just focus input — don't create another
  const current = getActiveChat();
  if (current && current.messages.length === 0) {
    userInput.focus(); closeSidebarMobile(); return;
  }
  // Check if any empty chat already exists — reuse it
  const existingEmpty = chats.find(c => c.messages.length === 0);
  if (existingEmpty) {
    activeChatId = existingEmpty.id;
  } else {
    const nc = createChat('New Chat');
    activeChatId = nc.id;
  }
  saveActiveChat();
  renderSidebar(); renderMessages(); userInput.focus(); closeSidebarMobile();
});

const headerTitle     = document.getElementById('headerChatTitle');
const messagesEl      = document.getElementById('messages');

function switchChat(id) {
  if (id === activeChatId) return;
  activeChatId = id;
  saveActiveChat();
  renderSidebar(); renderMessages(); userInput.focus();
}

function renderMessages() {
  const chat = getActiveChat(); if (!chat) return;
  headerTitle.textContent = chat.title;
  messagesEl.innerHTML = '';
  if (chat.messages.length === 0) { renderEmptyState(); return; }
  chat.messages.forEach(m => {
    if (m.role === 'user')           renderUserBubble(m.content, m.time, false);
    else if (m.role === 'assistant') renderAIBubble(m.content, m.time);
  });
  scrollToBottom();
}

function renderEmptyState() {

/* ══════════════════════════════════════════════════════════════
   INPUT + SEND
══════════════════════════════════════════════════════════════ */
const userInput   = document.getElementById('userInput');
const sendBtn     = document.getElementById('sendBtn');
const clearBtn    = document.getElementById('clearBtn');
const charCounter = document.getElementById('charCounter');
const rateBadge   = document.getElementById('rateBadge');

function updateCharCounter() {
  const len = userInput.value.length;
  charCounter.textContent = `${len} / ${MAX_MSG_LEN}`;
  charCounter.className   = 'char-counter' + (len >= MAX_MSG_LEN ? ' over' : len > MAX_MSG_LEN * .9 ? ' warn' : '');
}

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
  if (userInput.value.length > MAX_MSG_LEN) userInput.value = userInput.value.slice(0, MAX_MSG_LEN);
  updateCharCounter();
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
sendBtn.addEventListener('click', handleSend);

clearBtn.addEventListener('click', () => {
  const chat = getActiveChat(); if (!chat) return;
  showConfirm('Clear this chat?', 'Messages in this chat will be removed.', () => {
    chat.messages = []; saveChats(); renderMessages();
    userInput.value = ''; userInput.style.height = 'auto';
    updateCharCounter(); userInput.focus();
  });
});

function showRateBadge(ms) {
  rateBadge.classList.add('show');
  setTimeout(() => rateBadge.classList.remove('show'), ms);
}

async function handleSend() {
  const nowMs = Date.now();
  if (nowMs - lastSendTime < RATE_LIMIT_MS) {
    showRateBadge(RATE_LIMIT_MS - (nowMs - lastSendTime) + 200); return;
  }

  const rawText = userInput.value.trim();
  if (!rawText || sendBtn.disabled) return;

  const text = sanitize(rawText);
  if (!text || text.length > MAX_MSG_LEN) { appendAIError(`Message too long (max ${MAX_MSG_LEN} chars).`); return; }

  lastSendTime = Date.now();

  // Lazy creation: if somehow no active chat exists, create one now
  let chat = getActiveChat();
  if (!chat) {
    const nc = createChat('New Chat');
    activeChatId = nc.id;
    saveActiveChat();
    chat = nc;
  }

  // Auto-title from first message and persist
  if (chat.messages.length === 0) {
    chat.title = titleFromMsg(text);
    headerTitle.textContent = chat.title;
    saveChats(); saveActiveChat(); renderSidebar();
  }

  messagesEl.querySelector('.empty-state')?.remove();

  const timestamp = nowTime();
  chat.messages.push({ role: 'user', content: text, time: timestamp });
  saveChats();

  renderUserBubble(text, timestamp, true);
  userInput.value = ''; userInput.style.height = 'auto'; updateCharCounter();
  sendBtn.disabled = true;

  const thinkId = showThinking();
  let thinkingRemoved = false;

  try {
    const context = chat.messages
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .slice(-CONTEXT_MSGS)
      .map(m => ({ role: m.role, content: m.content }));

    const data = await apiCall('/chat', {
      method:  'POST',
      headers: authHeaders(),
      body:    JSON.stringify({ messages: context }),
    });

    removeThinking(thinkId);
    thinkingRemoved = true;

    const reply     = data.reply ?? 'No response received.';
    const replyTime = nowTime();

    // Use server-generated title if available (first message only)
    // Falls back to local title generation if server didn't return one
    if (chat.messages.length === 1 && data.title) {
      chat.title = data.title;
      headerTitle.textContent = chat.title;
      saveChats(); renderSidebar();
    }

    // Stream character-by-character into the bubble in real-time
    await streamAIBubble(reply, replyTime);

    chat.messages.push({ role: 'assistant', content: reply, time: replyTime });
    saveChats();

  } catch (err) {
    if (!thinkingRemoved) removeThinking(thinkId);
    if (err.message.includes('401') || err.message.toLowerCase().includes('token')) {
      appendAIError('Session expired. Logging you out…');
      setTimeout(() => document.getElementById('logoutBtn').click(), 1500);
    } else {
      appendAIError(err.message || 'Network error — check your connection.');
    }
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

/* ══════════════════════════════════════════════════════════════
   RENDER BUBBLES
══════════════════════════════════════════════════════════════ */
function renderUserBubble(text, time, animate) {
  const initials = currentUser ? currentUser.charAt(0).toUpperCase() : 'U';
  const d = document.createElement('div');
  d.className = 'message user-message';
  if (!animate) d.style.animation = 'none';
  d.innerHTML = `
    <div class="msg-avatar user-avatar"><span class="user-avatar-letter">${initials}</span></div>
    <div class="msg-content">
      <div class="msg-sender">You</div>
      <div class="msg-bubble">${escapeHTML(text)}</div>
      <div class="msg-time">${time || ''}</div>
    </div>`;
  messagesEl.appendChild(d);
  if (animate) scrollToBottom();
}

// Instant render — used when loading chat history (no animation)
function renderAIBubble(fullText, time) {
  const d = document.createElement('div');
  d.className = 'message ai-message';
  d.style.animation = 'none';

  const content = document.createElement('div'); content.className = 'msg-content';
  content.innerHTML = `<div class="msg-sender">Ashra</div>`;
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  bubble.innerHTML = parseMarkdown(fullText);
  content.appendChild(bubble);
  const t = document.createElement('div'); t.className = 'msg-time'; t.textContent = time || '';
  content.appendChild(t);

  d.innerHTML = `<div class="msg-avatar ai-avatar"><svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" stroke="white" stroke-width="7" stroke-linejoin="round"/></svg></div>`;
  d.appendChild(content);
  messagesEl.appendChild(d);
}

// Real-time streaming — character by character, markdown rendered live
// Thinking indicator must be removed BEFORE calling this
async function streamAIBubble(fullText, time) {
  // Create the bubble immediately (visible right away)
  const d = document.createElement('div');
  d.className = 'message ai-message';

  const content = document.createElement('div'); content.className = 'msg-content';
  content.innerHTML = `<div class="msg-sender">Ashra</div>`;
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  content.appendChild(bubble);

  d.innerHTML = `<div class="msg-avatar ai-avatar"><svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" stroke="white" stroke-width="7" stroke-linejoin="round"/></svg></div>`;
  d.appendChild(content);
  messagesEl.appendChild(d);
  scrollToBottom();

  // Stream character-by-character using requestAnimationFrame for smoothness
  // CHUNK_SIZE controls how many chars are revealed per frame
  // Higher = faster streaming feel; lower = slower but smoother
  const CHUNK_SIZE = 3;
  const FRAME_DELAY = 16; // ~60fps

  let i = 0;
  await new Promise(resolve => {
    function tick() {
      if (i >= fullText.length) {
        // Streaming complete — render final parsed markdown + timestamp
        bubble.innerHTML = parseMarkdown(fullText);
        const t = document.createElement('div'); t.className = 'msg-time'; t.textContent = time || '';
        content.appendChild(t);
        scrollToBottom();
        resolve();
        return;
      }

      i = Math.min(i + CHUNK_SIZE, fullText.length);
      const partial = fullText.slice(0, i);

      // Render markdown on partial text so formatting shows in real-time
      bubble.innerHTML = parseMarkdown(partial) +
        '<span class="typing-cursor"></span>';
      scrollToBottom();

      setTimeout(tick, FRAME_DELAY);
    }
    tick();
  });
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function scrollToBottom() {
  requestAnimationFrame(() => { messagesWrapper.scrollTop = messagesWrapper.scrollHeight; });
}
function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br>');
}
function escapeAttr(str) { return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeHTMLRaw(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseMarkdown(text) {
  // Process line by line so partial lines during streaming stay clean
  const lines = text.split('\n');
  let html = '';
  let inCode = false;
  let codeBuffer = '';
  let codeLang = '';

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // ── Code fence open/close ──────────────────────────
    if (/^```/.test(line)) {
      if (!inCode) {
        inCode = true;
        codeLang = line.slice(3).trim();
        codeBuffer = '';
      } else {
        inCode = false;
        html += `<pre><code>${escapeHTMLRaw(codeBuffer.trimEnd())}</code></pre>`;
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += line + '\n'; continue; }

    // ── Headings ───────────────────────────────────────
    if (/^### /.test(line)) { html += `<div class="md-h3">${inlineMarkdown(line.slice(4))}</div>`; continue; }
    if (/^## /.test(line))  { html += `<div class="md-h2">${inlineMarkdown(line.slice(3))}</div>`; continue; }
    if (/^# /.test(line))   { html += `<div class="md-h1">${inlineMarkdown(line.slice(2))}</div>`; continue; }

    // ── Bullet / numbered list → always render as • ───
    const bulletMatch  = line.match(/^[-*+] (.+)/);
    const numberedMatch = line.match(/^\d+\. (.+)/);
    if (bulletMatch || numberedMatch) {
      const content = bulletMatch ? bulletMatch[1] : numberedMatch[1];
      html += `<div class="md-bullet">• ${inlineMarkdown(content)}</div>`;
      continue;
    }

    // ── Blank line → spacer ────────────────────────────
    if (line.trim() === '') { html += '<div class="md-spacer"></div>'; continue; }

    // ── Normal paragraph line ─────────────────────────
    html += `<div class="md-line">${inlineMarkdown(line)}</div>`;
  }

  // Flush any unclosed code block (happens mid-stream)
  if (inCode && codeBuffer) {
    html += `<pre><code>${escapeHTMLRaw(codeBuffer)}</code></pre>`;
  }

  return html;
}

// Inline markdown: bold, italic, inline code (safe on partial text)
function inlineMarkdown(text) {
  return escapeHTMLRaw(text)
    // Bold — only process if both ** are present on this line
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}
